<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eoboot Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #003366, #ffcc00);
            color: white;
        }
        header {
            padding: 10px;
            text-align: center;
            animation: fadeIn 2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .hero {
            padding: 50px;
            text-align: center;
        }
        .services, .pricing, .testimonials, .contact {
            padding: 20px;
            margin: 20px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
        }
        @media(max-width: 600px) {
            body {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to Eoboot</h1>
    <nav>
        <a href="#services">Services</a>
        <a href="#pricing">Pricing</a>
        <a href="#testimonials">Testimonials</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Your Solution for LinkedIn Account Rental and Unban Support</h2>
</section>

<section id="services" class="services">
    <h2>Our Services</h2>
    <p>LinkedIn account rental and unban support.</p>
</section>

<section id="pricing" class="pricing">
    <h2>Pricing Plans</h2>
    <p>Check our competitive pricing plans.</p>
</section>

<section id="testimonials" class="testimonials">
    <h2>Testimonials</h2>
    <p>What our clients say about us.</p>
</section>

<section id="contact" class="contact">
    <h2>Contact Us</h2>
    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message" required></textarea>
        <button type="submit">Send</button>
    </form>
</section>

</body>
</html>
